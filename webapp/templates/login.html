{% extends "base.html" %}
{% block body %}
<div class="authwrap">
  <div class="card">
    <h2 style="margin-top:0">เข้าสู่ระบบ</h2>
    <form action="{{ url_for('auth.login') }}" method="post">
      <label>Username หรือ Email</label>
      <input type="text" name="username" required autofocus>
      <label>Password</label>
      <div class="pwwrap">
        <input type="password" name="password" id="pw" required>
        <button type="button" class="pwtoggle" id="pwtoggle" title="แสดง/ซ่อนรหัสผ่าน" aria-label="แสดง/ซ่อนรหัสผ่าน">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div style="margin-top:16px"><button class="btn" type="submit">เข้าสู่ระบบ</button></div>
    </form>
    {% if google %}
    <div class="divider">หรือ</div>
    <a class="btn google" href="{{ url_for('auth.google_login') }}">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.9 6.2C12.4 13.7 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.6c0-1.6-.1-3.2-.4-4.6H24v9h12.4c-.5 2.9-2.2 5.3-4.7 7l7.6 5.9c4.4-4.1 7-10.1 7-17.3z"/><path fill="#FBBC05" d="M10.5 28.6c-.5-1.4-.8-2.9-.8-4.6s.3-3.2.8-4.6l-7.9-6.2C1 16.5 0 20.1 0 24s1 7.5 2.6 10.8l7.9-6.2z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.6-5.9c-2.1 1.4-4.8 2.3-7.9 2.3-6.3 0-11.6-4.2-13.5-9.9l-7.9 6.2C6.5 42.6 14.6 48 24 48z"/></svg>
      เข้าสู่ระบบด้วย Google
    </a>
    {% endif %}
  </div>
</div>
<script>
(function () {
  var b = document.getElementById("pwtoggle"), pw = document.getElementById("pw");
  b.addEventListener("click", function () {
    pw.type = pw.type === "password" ? "text" : "password";
    b.classList.toggle("on");   // เปลี่ยนสีไอคอนเป็นเขียวเมื่อแสดงรหัส
  });
})();
</script>
{% endblock %}
