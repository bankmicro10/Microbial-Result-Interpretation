<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Microbial Result Interpretation</title>
<style>
  :root{
    --brand:#00843D;--brand-dark:#006B31;--brand-light:#E7F3EA;
    --bd:#e3e6e1;--mut:#5f6b60;--acc:#00843D;--ok:#00843D;--warn:#8a5a0b;--danger:#c0392b;
    --bg:#f4f7f3
  }
  *{box-sizing:border-box}
  body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#26302a;background:var(--bg);margin:0;line-height:1.55}
  .appbar{background:linear-gradient(90deg,var(--brand-dark),var(--brand));color:#fff}
  .appbar .inner{max-width:1000px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:12px}
  .logo{width:48px;height:48px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;padding:2px}
  .logo img{width:100%;height:100%;object-fit:contain;display:block}
  .logo.logo--txt{color:var(--brand-dark);font-weight:800;font-size:15px;letter-spacing:-.5px}
  .appbar .ttl{font-size:16px;font-weight:600;line-height:1.2}
  .appbar .tag{font-size:12.5px;opacity:.85;line-height:1.2}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 20px 60px}
  h1{font-size:22px;font-weight:600;margin:0 0 4px}
  h2{font-size:17px;font-weight:600;margin:24px 0 10px}
  .sub{color:var(--mut);font-size:14px;margin:0 0 20px}
  a{color:var(--acc);text-decoration:none}
  a:hover{text-decoration:underline}
  .card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 2px rgba(16,40,24,.04)}
  label{display:block;font-size:13px;color:var(--mut);margin:10px 0 4px}
  input,select{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:8px;font-size:14px;background:#fff}
  input:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,132,61,.14)}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .row>div{flex:1;min-width:120px}
  .btn{display:inline-block;background:var(--brand);color:#fff;border:0;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer}
  .btn:hover{background:var(--brand-dark)}
  .btn.ok{background:var(--brand)} .btn.danger{background:var(--danger)} .btn.danger:hover{background:#a5321f}
  .btn.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)} .btn.ghost:hover{background:var(--brand-light)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--bd)}
  thead tr{background:var(--brand-light)}
  th{color:var(--brand-dark);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
  tbody tr:hover{background:#f7faf6}
  .pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .Submitted{background:#fbf0d8;color:var(--warn)} .Approved{background:var(--brand-light);color:var(--brand-dark)} .Rejected{background:#fbe7e4;color:var(--danger)}
  .stepper{display:flex;align-items:flex-start;gap:0;margin:4px 0 22px;max-width:560px}
  .step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;text-align:center}
  .step .dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;background:#fff;border:2px solid var(--bd);color:var(--mut);z-index:1}
  .step .lbl{font-size:12.5px;color:var(--mut);margin-top:6px;font-weight:600}
  .step:not(:last-child)::after{content:"";position:absolute;top:15px;left:50%;width:100%;height:2px;background:var(--bd);z-index:0}
  .step.done .dot{background:var(--brand);border-color:var(--brand);color:#fff}
  .step.done:not(:last-child)::after{background:var(--brand)}
  .step.active .dot{background:#fff;border-color:var(--brand);color:var(--brand);box-shadow:0 0 0 3px rgba(0,132,61,.16)}
  .step.active .lbl{color:var(--brand-dark)}
  .mono{font-family:ui-monospace,Menlo,monospace}
  .hl{background:#fff8e8}
  .flash{background:#fbe7e4;color:var(--danger);border:1px solid #f0c0c0;padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:14px}
  .muted{color:var(--mut);font-size:13px}
  .log{font-size:12.5px;color:var(--mut)}
  .log li{margin:3px 0}
</style>
</head>
<body>
<div class="appbar">
  <div class="inner">
    <div class="logo"><img src="{{ url_for('static', filename='cpf-logo.png') }}" alt="CPF"
         onerror="this.parentNode.classList.add('logo--txt');this.parentNode.textContent='CPF'"></div>
    <div>
      <div class="ttl">Microbial Result Interpretation</div>
      <div class="tag">แปลผลการนับโคโลนีตาม ISO 7218 / FDA BAM Ch.3 / General</div>
    </div>
  </div>
</div>
<div class="wrap">
  {% with msgs = get_flashed_messages() %}
    {% for m in msgs %}<div class="flash">{{ m }}</div>{% endfor %}
  {% endwith %}
  {% block body %}{% endblock %}
</div>
</body>
</html>
